name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos
            build_script: desktop:dist:mac
            asset_paths: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            artifact_name: windows
            build_script: desktop:dist:win
            asset_paths: |
              release/*.exe
              release/*.zip
              release/*.yml
          - os: ubuntu-latest
            artifact_name: linux
            build_script: desktop:dist:linux
            asset_paths: |
              release/*.AppImage
              release/*.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@10.17.1 --activate
      - run: pnpm install --frozen-lockfile
      - run: node scripts/generate-app-icon.mjs
      - run: pnpm rebuild electron node-pty
      - run: pnpm ${{ matrix.build_script }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: ${{ matrix.asset_paths }}
          if-no-files-found: error

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-bundle
      - name: Generate checksums
        run: |
          find release-bundle -type f -print0 | LC_ALL=C sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-bundle/**/*
            SHA256SUMS.txt
